<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孟乃欣的藝術空間 - 數位存檔復活版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --washi-bg: #F4F1EA;
            --text-main: #2D2D2D;
            --seal-red: #aa300b;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--washi-bg);
            color: var(--text-main);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); 
        }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 10px; }

        /* 文章內文圖片排版 */
        .prose-content img {
            max-width: 100%;
            height: auto;
            margin: 2rem auto;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .prose-content p {
            margin-bottom: 1.5rem;
            line-height: 2;
            letter-spacing: 0.03em;
            font-size: 1.15rem;
        }

        /* 列表樣式：單行、標題縮斷 */
        .post-item {
            display: flex;
            justify-content: flex-start;
            align-items: baseline;
            white-space: nowrap;
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .post-title {
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1; /* 標題太長時縮小 */
        }

        .post-date-tag {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 9px;
            margin-left: 8px;
            flex-shrink: 0; /* 日期不縮小 */
            opacity: 0.6;
        }

        /* 選中狀態：印泥紅 */
        .active-post {
            color: var(--seal-red) !important;
            font-weight: bold !important;
            background-color: white !important;
        }
        .active-post .post-date-tag {
            color: var(--seal-red);
            opacity: 0.8;
        }

        /* 分類標題 */
        .category-header {
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        .category-header:hover {
            background-color: rgba(0,0,0,0.05);
        }

        /* 手風琴摺疊動畫 */
        .post-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .post-container.expanded {
            max-height: 2000px;
        }

        /* 箭頭旋轉 */
        .arrow {
            transition: transform 0.3s;
            display: inline-block;
        }
        .category-section.expanded .arrow {
            transform: rotate(90deg);
        }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <script src="data.js"></script>

    <div class="flex flex-col md:flex-row h-full">
        
        <!-- 左側：互斥型摺疊清單 -->
        <aside class="w-full md:w-72 lg:w-80 bg-white/40 border-r border-stone-200 overflow-y-auto flex-shrink-0 flex flex-col order-2 md:order-1">
            <div class="p-6 border-b border-stone-200 bg-white/20">
                <h1 class="text-xl font-bold tracking-widest text-stone-800">孟乃欣</h1>
                <p class="text-[10px] text-stone-400 tracking-[0.2em] uppercase mt-1">數位存檔 · 分類索引</p>
            </div>
            
            <nav id="post-list" class="flex-1 divide-y divide-stone-100">
                <!-- 由 JS 生成 -->
            </nav>
        </aside>

        <!-- 右側：內容閱讀區 -->
        <main class="flex-1 overflow-y-auto order-1 md:order-2 bg-white/10 shadow-inner" id="content-area">
            
            <div id="welcome-message" class="h-full flex flex-col items-center justify-center p-10 text-stone-300">
                <h2 class="text-xl font-light tracking-widest italic">選取文章以開始閱讀</h2>
            </div>

            <article id="article-viewer" class="hidden max-w-4xl mx-auto px-8 py-16 md:px-12 lg:px-20">
                <header class="mb-12 text-center">
                    <span id="view-category" class="inline-block px-3 py-0.5 border border-stone-300 text-[10px] tracking-[0.3em] text-stone-400 uppercase mb-6"></span>
                    <h2 id="view-title" class="text-3xl md:text-4xl font-bold text-stone-900 mb-4 leading-tight"></h2>
                    <time id="view-date" class="text-xs text-stone-400 font-light"></time>
                </header>
                
                <div id="view-content" class="prose-content"></div>

                <footer class="mt-32 pt-12 border-t border-stone-200 text-center text-stone-300 text-[10px] tracking-widest mb-20">
                    DIGITAL ARCHIVE REVIVAL &copy; 2024
                </footer>
            </article>
        </main>
    </div>

    <script>
        const blogData = window.blogData || [];

        // 排序順序
        const customOrder = ["書法", "The Beatles", "Mozart!", "費加洛婚禮", "Don Giovanni", "雜記"];

        function init() {
            if (blogData.length === 0) {
                document.getElementById('post-list').innerHTML = '<div class="p-10 text-red-400 text-center text-sm">找不到資料</div>';
                return;
            }
            renderAccordionList();
            showArticle(0); // 預設開啟第一篇
        }

        function renderAccordionList() {
            const listEl = document.getElementById('post-list');
            
            // 1. 分組資料
            const groups = blogData.reduce((acc, post, index) => {
                const cat = post.category || "未分類";
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push({ ...post, originalIndex: index });
                return acc;
            }, {});

            // 2. 排序分類
            const sortedCategories = Object.keys(groups).sort((a, b) => {
                let indexA = customOrder.indexOf(a);
                let indexB = customOrder.indexOf(b);
                if (indexA === -1) indexA = 999;
                if (indexB === -1) indexB = 999;
                return indexA - indexB || a.localeCompare(b);
            });

            // 3. 生成 HTML
            listEl.innerHTML = sortedCategories.map(category => {
                const posts = groups[category];
                return `
                    <div class="category-section" id="cat-section-${category}">
                        <div class="category-header flex justify-between items-center px-5 py-3 bg-stone-50/50" 
                             onclick="handleCategoryClick('${category}')">
                            <span class="text-sm font-bold text-stone-600">
                                <span class="arrow mr-1">▸</span> ${category}
                            </span>
                            <span class="text-[10px] text-stone-400 bg-white px-1.5 rounded-full border border-stone-200">${posts.length}</span>
                        </div>
                        <div id="posts-${category}" class="post-container">
                            ${posts.map(post => {
                                // 僅顯示日期部分 YYYY/MM/DD
                                const shortDate = post.date.split(' ')[0];
                                return `
                                    <div onclick="showArticle(${post.originalIndex})" 
                                         id="post-item-${post.originalIndex}"
                                         class="post-item px-8 py-2 text-xs text-stone-500 hover:text-stone-900 hover:bg-white/80 cursor-pointer border-b border-stone-50/30">
                                        <span class="post-title">${post.title}</span>
                                        <span class="post-date-tag">${shortDate}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 處理類別點擊：收合其他
        function handleCategoryClick(category) {
            const targetContainer = document.getElementById(`posts-${category}`);
            const targetSection = document.getElementById(`cat-section-${category}`);
            const isClosing = targetContainer.classList.contains('expanded');

            document.querySelectorAll('.post-container').forEach(c => c.classList.remove('expanded'));
            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('expanded'));

            if (!isClosing) {
                targetContainer.classList.add('expanded');
                targetSection.classList.add('expanded');
            }
        }

        function showArticle(index) {
            const post = blogData[index];
            if (!post) return;

            const viewer = document.getElementById('article-viewer');
            const welcome = document.getElementById('welcome-message');
            const contentArea = document.getElementById('content-area');

            welcome.classList.add('hidden');
            viewer.classList.remove('hidden');
            
            document.getElementById('view-title').innerText = post.title;
            document.getElementById('view-date').innerText = post.date;
            document.getElementById('view-category').innerText = post.category;
            document.getElementById('view-content').innerHTML = post.content;

            viewer.classList.remove('fade-in');
            void viewer.offsetWidth; 
            viewer.classList.add('fade-in');

            contentArea.scrollTo({ top: 0, behavior: 'smooth' });

            // 更新選中視覺
            document.querySelectorAll('.post-item').forEach(el => el.classList.remove('active-post'));
            const activeEl = document.getElementById(`post-item-${index}`);
            if (activeEl) {
                activeEl.classList.add('active-post');
                
                // 自動展開該文章所屬的分類
                const category = post.category || "未分類";
                const targetContainer = document.getElementById(`posts-${category}`);
                const targetSection = document.getElementById(`cat-section-${category}`);
                if (targetContainer && !targetContainer.classList.contains('expanded')) {
                    document.querySelectorAll('.post-container').forEach(c => c.classList.remove('expanded'));
                    document.querySelectorAll('.category-section').forEach(s => s.classList.remove('expanded'));
                    targetContainer.classList.add('expanded');
                    targetSection.classList.add('expanded');
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
